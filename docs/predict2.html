<!DOCTYPE html>
<html>
<head>
  <title>Bike Time Predictor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f7fa;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      width: 320px;
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
    }

    .input-group {
      margin-bottom: 20px;
      text-align: left;
    }

    label {
      font-size: 14px;
      color: #555;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 10px;
      border: 1px solid #ddd;
      font-size: 16px;
    }

    input[type=range] {
      padding: 0;
    }

    .value {
      font-size: 14px;
      color: #888;
      margin-top: 5px;
    }

    .result {
      margin-top: 20px;
      font-size: 28px;
      font-weight: bold;
      color: #2c7be5;
    }
  </style>
</head>

<body>

  <div class="card">
    <h2>Bike Time Predictor</h2>

    <div class="input-group">
      <label>Weight (kg)</label>
      <input type="range" id="weight" min="50" max="100" step="0.5" value="75">
      <div class="value" id="weight_val">75 kg</div>
    </div>

    <div class="input-group">
      <label>Average Watts</label>
      <input type="range" id="watts" min="100" max="400" step="5" value="250">
      <div class="value" id="watts_val">250 W</div>
    </div>

    <div class="input-group">
      <label>Wind Direction</label>
      <select id="wind_dir">
        <option value="0">North (N)</option>
        <option value="45">North-East (NE)</option>
        <option value="90">East (E)</option>
        <option value="135">South-East (SE)</option>
        <option value="180">South (S)</option>
        <option value="225">South-West (SW)</option>
        <option value="270">West (W)</option>
        <option value="315">North-West (NW)</option>
      </select>
    </div>

    <div class="result" id="result">--:--</div>
  </div>

  <script>
    function predictTime() {
      const weight = parseFloat(document.getElementById("weight").value);
      const watts = parseFloat(document.getElementById("watts").value);
      const wind_deg = parseFloat(document.getElementById("wind_dir").value);

      // Update displayed values
      document.getElementById("weight_val").innerText = weight + " kg";
      document.getElementById("watts_val").innerText = watts + " W";

      // Convert wind direction
      const wind_dir_rad = wind_deg * Math.PI / 180;
      const u = Math.sin(wind_dir_rad);
      const v = Math.cos(wind_dir_rad);

      // 👇 REPLACE with your real coefficients
      const intercept = 45.2;
      const b_watts = -0.08;
      const b_u = 2.0;
      const b_v = -1.5;

      const minutter = intercept 
                     + b_watts * watts 
                     + b_u * u 
                     + b_v * v;

      // Convert to mm:ss
      const mins = Math.floor(minutter);
      const secs = Math.round((minutter - mins) * 60);

      const finalMins = secs === 60 ? mins + 1 : mins;
      const finalSecs = secs === 60 ? 0 : secs;

      const secsFormatted = finalSecs.toString().padStart(2, '0');

      document.getElementById("result").innerText =
        `${finalMins}:${secsFormatted}`;
    }

    // Live updates
    document.getElementById("weight").addEventListener("input", predictTime);
    document.getElementById("watts").addEventListener("input", predictTime);
    document.getElementById("wind_dir").addEventListener("change", predictTime);

    // Initial calculation
    predictTime();
  </script>

</body>
</html>
