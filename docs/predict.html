<!DOCTYPE html>
<html>
<head>
  <title>Time Predictor</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="assets/styles.css">
  <link rel="stylesheet" href="assets/header.css">
</head>
<body>

  <header class="app-header">
    <div class="app-header--title">Tryvann Predictor</div>
  </header>

  <div class="container">
    <label>Rider weight (kg):</label><br>
    <input type="number" id="weight"><br><br>

    <label>Average Watts:</label><br>
    <input type="number" id="watts"><br><br>

    <label>Wind speed (m/s):</label><br>
    <input type="number" id="wind_speed"><br><br>

    <label>Wind Direction:</label><br>
    <select id="wind_dir">
      <option value="180">South</option>
      <option value="225">South west</option>
      <option value="270">West</option>
      <option value="315">North West</option>
      <option value="0">North</option>
      <option value="45">North East</option>
      <option value="90">East</option>
      <option value="135">South East</option>

    </select><br><br>

    <button onclick="predictTime()">Calculate</button>

    <h3 id="result"></h3>
  </div>
  <script>
    function predictTime() {
      const weight = parseFloat(document.getElementById("weight").value);
      const watts = parseFloat(document.getElementById("watts").value);
      const wind_speed = parseFloat(document.getElementById("wind_speed").value);
      const wind_deg = parseFloat(document.getElementById("wind_dir").value);

      const wind_dir_rad = wind_deg * Math.PI / 180;
      const u = wind_speed*Math.sin(wind_dir_rad); // øst-vest
      const v = wind_speed*Math.cos(wind_dir_rad); // nord-sør

      // coefficients
      const intercept = 28.75857151;
      const b_watts = -1.97684089;
      const b_v = 0.04889548;
      const b_u = 0.02156564;

      // If you used watt/kg instead:
      const wattkg = watts / weight;

      // Example using average_watts model:
      const minutter = intercept 
                     + b_watts * wattkg 
                     + b_v * v; 
                     + b_u * u;
    // Get whole minutes
    const floormins = Math.floor(minutter);

    // Get seconds
    const secs = Math.round((minutter - floormins) * 60);

    // Handle edge case (e.g. 59.9 → 60 sec)
    const finalMins = secs === 60 ? floormins + 1 : floormins;
    const finalSecs = secs === 60 ? 0 : secs;

    // Format with leading zero
    const secsFormatted = finalSecs.toString().padStart(2, '0');

document.getElementById("result").innerText =
  `Predicted time: ${finalMins}:${secsFormatted}`;

    }
  </script>

</body>
</html>
