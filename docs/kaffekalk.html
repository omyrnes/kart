<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaffekalkulator</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f5f7fa;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 50px 0;
  }
  .card {
    background: white;
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    width: 320px;
    text-align: center;
    margin-bottom: 30px;
  }
  h2 { margin-bottom: 20px; }
  .input-group { margin-bottom: 20px; text-align: left; }
  label { font-size: 14px; color: #555; }
  input[type=range] {
    width: 100%;
    -webkit-appearance: none;
    height: 8px;
    background: #ddd;
    border-radius: 5px;
    padding: 0;
    margin-top: 10px;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    background: white;
    border: 2px solid brown;
    border-radius: 50%;
    cursor: pointer;
    margin-top: -6px;
  }
  input[type=range]::-moz-range-thumb {
    width: 20px;
    height: 20px;
    background: white;
    border: 2px solid brown;
    border-radius: 50%;
    cursor: pointer;
  }
  .value { font-size: 14px; color: #888; margin-top: 5px; text-align: right; }
</style>
</head>
<body>

<div class="card">
  <h2>Kaffekalkulator</h2>

  <div class="input-group">
    <label>Vann (ml)</label>
    <input type="range" id="water" min="0" max="2000" step="10" value="500">
    <div class="value" id="water_val">416 ml</div>
  </div>

  <div class="input-group">
    <label>Kaffe (g)</label>
    <input type="range" id="coffee" min="0" max="100" step="1" value="30">
    <div class="value" id="coffee_val">24 g</div>
  </div>

</div>

<script>
const waterSlider = document.getElementById('water');
const coffeeSlider = document.getElementById('coffee');
const waterVal = document.getElementById('water_val');
const coffeeVal = document.getElementById('coffee_val');

// Fixed ratio 1000 ml / 60 g
const ratio = 1000 / 60;
let updating = false;

function updateSliderFill(slider) {
  const min = slider.min;
  const max = slider.max;
  const val = slider.value;
  const percentage = ((val - min) / (max - min)) * 100;
  slider.style.background = `linear-gradient(to right, brown 0%, brown ${percentage}%, #ddd ${percentage}%, #ddd 100%)`;
}

function updateValues(changedSlider) {
  if (!updating) {
    updating = true;

    if (changedSlider === 'water') {
      const water = parseFloat(waterSlider.value);
      coffeeSlider.value = Math.min(coffeeSlider.max, water / ratio);
    } else if (changedSlider === 'coffee') {
      const coffee = parseFloat(coffeeSlider.value);
      waterSlider.value = Math.min(waterSlider.max, coffee * ratio);
    }

    updating = false;
  }

  // Update display values
  waterVal.innerText = `${parseFloat(waterSlider.value).toFixed(0)} ml`;
  coffeeVal.innerText = `${parseFloat(coffeeSlider.value).toFixed(1)} g`;

  // Update both slider fills
  updateSliderFill(waterSlider);
  updateSliderFill(coffeeSlider);
}

// Attach listeners
[waterSlider, coffeeSlider].forEach(slider => {
  slider.addEventListener('input', () => updateValues(slider.id));
});

// Initial update
updateValues();
</script>

</body>
</html>
