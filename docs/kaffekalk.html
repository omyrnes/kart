<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaffekalkulator</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f5f7fa;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 50px 0;
  }

  .card {
    background: white;
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    width: 320px;
    text-align: center;
    margin-bottom: 30px;
  }

  h2 { margin-bottom: 20px; }
  .input-group { margin-bottom: 20px; text-align: left; }
  label { font-size: 14px; color: #555; display: block; margin-bottom: 5px; }

  input[type=range] {
    width: 100%;
    -webkit-appearance: none;
    height: 12px;
    background: #ddd;
    border-radius: 6px;
    padding: 0;
    touch-action: pan-x;
    -webkit-tap-highlight-color: transparent;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 28px;
    height: 28px;
    background: white;
    border: 3px solid brown;
    border-radius: 50%;
    cursor: pointer;
    margin-top: -0px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    transition: transform 0.1s;
  }

  input[type=range]:active::-webkit-slider-thumb {
    transform: scale(1.2);
  }

  input[type=range]::-moz-range-thumb {
    width: 28px;
    height: 28px;
    background: white;
    border: 3px solid brown;
    border-radius: 50%;
    cursor: pointer;
  }

  input[type=range]::-moz-range-track {
    height: 12px;
    background: #ddd;
    border-radius: 6px;
  }

  .value {
    font-size: 14px;
    color: #888;
    margin-top: 5px;
    text-align: right;
  }

</style>
</head>
<body>

<div class="card">
  <h2>Kaffekalkulator</h2>

  <div class="input-group">
    <label>Vann (ml)</label>
    <input type="range" id="water" min="0" max="2000" step="1" value="416">
    <div class="value" id="water_val">416 ml</div>
  </div>

  <div class="input-group">
    <label>Kaffe (g)</label>
    <input type="range" id="coffee" min="0" max="100" step="1" value="25">
    <div class="value" id="coffee_val">25 g</div>
  </div>

</div>

<script>
const waterSlider = document.getElementById('water');
const coffeeSlider = document.getElementById('coffee');
const waterVal = document.getElementById('water_val');
const coffeeVal = document.getElementById('coffee_val');

// Coffee-to-water ratio
const ratio = 1000 / 60;
let updating = false;

function updateSliderFill(slider) {
  const min = parseFloat(slider.min);
  const max = parseFloat(slider.max);
  const val = parseFloat(slider.value);

  // Calculate normalized percentage
  const percentage = (val - min) / (max - min);

  // Thumb width in px (must match CSS)
  const thumbWidth = 28;

  // Track width
  const trackWidth = slider.offsetWidth;

  // Correct the fill percentage so thumb center aligns
  const fillPercent = Math.min(100, Math.max(0, (percentage * (trackWidth - thumbWidth) + thumbWidth/2) / trackWidth * 100));

  slider.style.background = `linear-gradient(to right, brown 0%, brown ${fillPercent}%, #ddd ${fillPercent}%, #ddd 100%)`;
}

function updateValues(changed) {
  if (!updating) {
    updating = true;

    if (changed === 'water') {
      const water = parseFloat(waterSlider.value);
      coffeeSlider.value = Math.min(coffeeSlider.max, water / ratio);
    } else if (changed === 'coffee') {
      const coffee = parseFloat(coffeeSlider.value);
      waterSlider.value = Math.min(waterSlider.max, coffee * ratio);
    }

    updating = false;
  }

  waterVal.innerText = `${parseFloat(waterSlider.value).toFixed(0)} ml`;
  coffeeVal.innerText = `${parseFloat(coffeeSlider.value).toFixed(1)} g`;

  updateSliderFill(waterSlider);
  updateSliderFill(coffeeSlider);
}

// Slider events
waterSlider.addEventListener('input', () => updateValues('water'));
coffeeSlider.addEventListener('input', () => updateValues('coffee'));

// Initial setup
updateValues();
</script>

</body>
</html>
